name: Build and publish images

on:
  push:
    branches:
      - main
    tags:
      - 'obsidian-sync-v*'
      - 'reconciler-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - obsidian-sync
          - reconciler
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ matrix.image }}"
          SHOULD_BUILD=false
          TAGS=""

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            TAG_IMAGE="${TAG%-v*}"
            VERSION="v${TAG##*-v}"

            if [[ "$TAG_IMAGE" == "$IMAGE" ]]; then
              SHOULD_BUILD=true
              TAGS=$(cat <<EOF
          ghcr.io/${{ github.repository_owner }}/${IMAGE}:${VERSION}
          ghcr.io/${{ github.repository_owner }}/${IMAGE}:latest
          EOF
          )
            fi
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [[ "$BEFORE" =~ ^0+$ ]]; then
              CHANGED_FILES="$(git ls-tree -r --name-only "$AFTER")"
            else
              CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
            fi

            if echo "$CHANGED_FILES" | grep -Eq "^(images/${IMAGE}/|\\.github/workflows/release\\.yml$)"; then
              SHOULD_BUILD=true
              TAGS="ghcr.io/${{ github.repository_owner }}/${IMAGE}:latest"
            fi
          fi

          {
            echo "should_build=${SHOULD_BUILD}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.meta.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        if: steps.meta.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.meta.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./images/${{ matrix.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
